<!-- @dsCard group="Type" viewport="700x220" name="Display — Jost" subtitle="Geometric, Futura-lineage. Light weight, tight tracking at scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--navy-800); padding: 30px 32px; font-family: var(--font-display); }
  .meta { font-family: var(--font-text); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ivory-a44); margin-bottom: 4px; }
  .hero { font-weight: 300; font-size: 64px; line-height: 1.02; letter-spacing: -0.02em; color: var(--ivory); }
  .hero em { font-style: normal; color: var(--gold-400); }
  .d3 { font-weight: 400; font-size: 30px; letter-spacing: -0.01em; color: var(--ivory); margin-top: 22px; }
  .glyphs { font-weight: 300; font-size: 26px; color: var(--ivory-a64); margin-top: 18px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="meta">Display · Jost 300 / 400</div>
  <div class="hero">Delivered <em>to you.</em></div>
  <div class="d3">Premium Mobile IV Hydration</div>
  <div class="glyphs">AaBbGg &nbsp; 0123456789 &nbsp; $169 · $329</div>
</body>
</html>
