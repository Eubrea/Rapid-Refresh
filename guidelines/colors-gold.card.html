<!-- @dsCard group="Colors" viewport="700x150" name="Gold Scale" subtitle="Antique gold → champagne → foil. Precious, used sparingly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--navy-800); padding: 22px; font-family: var(--font-text); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--navy-300); }
  .chip { height: 74px; }
  .meta { padding: 8px 10px; background: var(--navy-700); }
  .name { font-size: 12px; font-weight: 600; color: var(--ivory); letter-spacing: 0.02em; }
  .hex { font-size: 11px; color: var(--ivory-a44); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><div class="meta"><div class="name">gold-700</div><div class="hex">#7E6210</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="name">gold-600</div><div class="hex">#A48111</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="meta"><div class="name">gold-500</div><div class="hex">#B8933A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><div class="meta"><div class="name">gold-400</div><div class="hex">#C9A24B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="meta"><div class="name">gold-300</div><div class="hex">#D9BC74</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><div class="meta"><div class="name">gold-200</div><div class="hex">#E8CE8A</div></div></div>
  </div>
</body>
</html>
