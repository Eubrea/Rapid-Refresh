<!-- @dsCard group="Brand" viewport="700x230" name="Logo Lockups" subtitle="Droplet mark + wordmark, soft warm shadow (never a glow)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; display: grid; grid-template-columns: 1.3fr 1fr; font-family: var(--font-display); }
  .panel { padding: 30px 34px; display: flex; align-items: center; gap: 26px; min-height: 230px; }
  .dark { background: var(--navy-800); }
  .light { background: var(--ivory); flex-direction: column; justify-content: center; gap: 20px; }
  .mark { width: 92px; height: 92px; filter: drop-shadow(var(--shadow-logo)); }
  .mark-sm { width: 54px; height: 54px; filter: drop-shadow(var(--shadow-logo)); }
  .wm { display: flex; flex-direction: column; line-height: 1; }
  .wm .n { font-weight: 500; font-size: 30px; letter-spacing: -0.01em; color: var(--ivory); }
  .wm .s { font-family: var(--font-text); font-weight: 600; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-400); margin-top: 8px; }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .stack .n { font-weight: 500; font-size: 20px; color: var(--charcoal); letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="panel dark">
    <img class="mark" src="../assets/logo-512.png" alt="RapidRefresh" />
    <div class="wm"><span class="n">RapidRefresh</span><span class="s">Mobile IV &amp; Wellness</span></div>
  </div>
  <div class="panel light">
    <div class="stack">
      <img class="mark-sm" src="../assets/logo-512.png" alt="RapidRefresh" />
      <span class="n">RapidRefresh</span>
    </div>
  </div>
</body>
</html>
