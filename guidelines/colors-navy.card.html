<!-- @dsCard group="Colors" viewport="700x150" name="Navy Scale" subtitle="Matte, desaturated — the luxury foundation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ivory); padding: 22px; font-family: var(--font-text); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--ivory-300); }
  .chip { height: 74px; }
  .meta { padding: 8px 10px; background: #fff; }
  .name { font-size: 12px; font-weight: 600; color: var(--charcoal); letter-spacing: 0.02em; }
  .hex { font-size: 11px; color: var(--slate-ink); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="meta"><div class="name">navy-900</div><div class="hex">#071233</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="meta"><div class="name">navy-800</div><div class="hex">#08153A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">navy-700</div><div class="hex">#09163D</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="meta"><div class="name">navy-600</div><div class="hex">#0A1945</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="meta"><div class="name">navy-500</div><div class="hex">#101F4E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-400)"></div><div class="meta"><div class="name">navy-400</div><div class="hex">#1B263B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-300)"></div><div class="meta"><div class="name">navy-300</div><div class="hex">#263255</div></div></div>
  </div>
</body>
</html>
