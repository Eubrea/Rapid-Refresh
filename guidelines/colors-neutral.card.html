<!-- @dsCard group="Colors" viewport="700x150" name="Ivory & Neutrals" subtitle="Off-white paper (never pure white) + charcoal ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--navy-800); padding: 22px; font-family: var(--font-text); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--navy-300); }
  .chip { height: 74px; }
  .meta { padding: 8px 10px; background: var(--navy-700); }
  .name { font-size: 12px; font-weight: 600; color: var(--ivory); letter-spacing: 0.02em; }
  .hex { font-size: 11px; color: var(--ivory-a44); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ivory)"></div><div class="meta"><div class="name">ivory</div><div class="hex">#F8F7F4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-100)"></div><div class="meta"><div class="name">ivory-100</div><div class="hex">#F1EFE9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-200)"></div><div class="meta"><div class="name">ivory-200</div><div class="hex">#E9E6DD</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-300)"></div><div class="meta"><div class="name">ivory-300</div><div class="hex">#D8D3C6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-ink)"></div><div class="meta"><div class="name">slate-ink</div><div class="hex">#3A414F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--charcoal)"></div><div class="meta"><div class="name">charcoal</div><div class="hex">#1A1E28</div></div></div>
  </div>
</body>
</html>
