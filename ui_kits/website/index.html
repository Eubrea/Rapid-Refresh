<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RapidRefresh Mobile IV &amp; Wellness</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--navy-900); }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-track { background: var(--navy-900); }
  ::-webkit-scrollbar-thumb { background: var(--navy-300); border-radius: 999px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="kit.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="DripMenu.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Memberships.jsx"></script>
<script type="text/babel" src="Booking.jsx"></script>
<script type="text/babel" src="ServiceArea.jsx"></script>
<script type="text/babel" src="CorporateEvents.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="GiftCards.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" data-presets="react">
  const KEY = 'rr-site-screen';
  const openJane = () => window.open(window.RR_JANEAPP || 'https://rapidrefreshivtherapy.janeapp.com/', '_blank', 'noopener');

  function App() {
    const [screen, setScreen] = React.useState(() => localStorage.getItem(KEY) || 'home');
    const go = (s) => { setScreen(s); localStorage.setItem(KEY, s); window.scrollTo({ top: 0, behavior: 'auto' }); };
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons({ nameAttr: 'data-lucide' }); });
    const book = () => go('booking');

    const Screen = { home: window.Home, menu: window.DripMenu, about: window.About, memberships: window.Memberships, booking: window.Booking, service: window.ServiceArea, corporate: window.CorporateEvents, pricing: window.Pricing, giftcards: window.GiftCards, faq: window.FAQ }[screen] || window.Home;
    return (
      <div>
        <window.Nav current={screen} onNavigate={go} onBook={book} overHero={screen === 'home'} />
        <main><Screen onNavigate={go} onBook={book} onJane={openJane} /></main>
        <window.Footer onNavigate={go} onJane={openJane} />
      </div>
    );
  }
  // Wait for all babel-transpiled component scripts to register on window.
  function boot() {
    if (window.Home && window.Nav && window.Footer && window.DripMenu && window.About && window.Memberships && window.Booking && window.ServiceArea && window.CorporateEvents && window.Pricing && window.GiftCards && window.FAQ && window.Photo && window.Collage) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } else { setTimeout(boot, 40); }
  }
  boot();
</script>
</body>
</html>
